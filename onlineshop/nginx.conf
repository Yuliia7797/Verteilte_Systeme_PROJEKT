upstream backend {
    least_conn;

    server server:8080 max_fails=3 fail_timeout=30s;
}

server {
    listen 80;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Ursprünglichen Hostnamen und Client-IP an den Backend-Server weitergeben
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket-Upgrade aktivieren
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Bei Serverausfall automatisch zur nächsten Instanz weiterleiten
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}