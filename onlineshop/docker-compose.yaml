version: '3.3'
services:

  # ── Load Balancer ──────────────────────────────────────────────────────────
  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server1
      - server2
    restart: always

  # ── Server 1 ───────────────────────────────────────────────────────────────
  server1:
    container_name: server1
    build: server
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 10000
    depends_on:
      - onlinebestellsystem

  # ── Server 2 ───────────────────────────────────────────────────────────────
  server2:
    container_name: server2
    build: server
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 10000
    depends_on:
      - onlinebestellsystem

  # ── Worker 1 ───────────────────────────────────────────────────────────────
  worker1:
    container_name: worker1
    build: server
    command: node worker.js
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
    depends_on:
      - onlinebestellsystem

  # ── Worker 2 ───────────────────────────────────────────────────────────────
  worker2:
    container_name: worker2
    build: server
    command: node worker.js
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
    depends_on:
      - onlinebestellsystem

  # ── Worker 3 ───────────────────────────────────────────────────────────────
  worker3:
    container_name: worker3
    build: server
    command: node worker.js
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
    depends_on:
      - onlinebestellsystem

  # ── Datenbank ──────────────────────────────────────────────────────────────
  onlinebestellsystem:
    container_name: onlinebestellsystem
    build: db
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: rootpw

  # ── phpMyAdmin ─────────────────────────────────────────────────────────────
  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8085:80"
    environment:
      PMA_HOST: onlinebestellsystem
