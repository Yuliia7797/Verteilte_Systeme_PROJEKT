version: '3.3'
services:

  # ── Load Balancer ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      server:
        condition: service_healthy
    restart: always

  # ── Server ─────────────────────────────────────────────────────────────────
  server:
    build: server
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 10000

      # Redis-Verbindung für Socket.IO-Adapter
      REDIS_URL: redis://redis:6379
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      onlinebestellsystem:
        condition: service_healthy

      # Redis muss gestartet sein, bevor der Server die Socket-Kommunikation initialisiert
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  # ── Redis für serverübergreifende WebSocket-Synchronisation ───────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  # ── Worker ─────────────────────────────────────────────────────────────────
  worker:
    build: worker
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
    # volumes:
    #   - ./worker:/usr/src/app
    #   - /usr/src/app/node_modules
    depends_on:
      - onlinebestellsystem
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  # ── Controller ─────────────────────────────────────────────────────────────
  controller:
    container_name: controller
    build: controller
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
    volumes:
      - ./controller:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - onlinebestellsystem

  # ── Datenbank ──────────────────────────────────────────────────────────────
  onlinebestellsystem:
    container_name: onlinebestellsystem
    build: db
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: rootpw
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── phpMyAdmin ─────────────────────────────────────────────────────────────
  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8085:80"
    environment:
      PMA_HOST: onlinebestellsystem
    depends_on:
      - onlinebestellsystem