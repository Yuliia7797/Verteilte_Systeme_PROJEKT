<!--
  Datei: adminbestelldetails.html
  Beschreibung: Diese Datei stellt die Detailseite für eine einzelne Bestellung im Admin-Bereich dar.
    Sie zeigt allgemeine Bestelldaten, Lieferadresse sowie die enthaltenen
    Bestellpositionen an. Die Daten werden über adminbestelldetails.js geladen.
  Autor: Anastasiia Mavrodi, Yuliia Shostak, Lea Seiler
  Datum: 05.04.2026
-->

<!DOCTYPE html>

<html lang="de">

<!-- =========================
     HEAD / METADATEN & STYLES
========================= -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestelldetails - MyShop</title>

  <!-- Bootstrap CSS (Layout & Responsivität) -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (Symbole) -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Eigenes Stylesheet -->

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- =========================
       HEADER (dynamisch geladen)
  ========================= -->

  <div id="header-placeholder"></div>

  <!-- =========================
       HAUPTINHALT BESTELLDETAILS
  ========================= -->

  <main class="py-5">
    <div class="container">


      <!-- Seitentitel -->
      <h1 class="section-title text-center mb-5">Bestelldetails</h1>

      <!-- =========================
       ALLGEMEINE INFORMATIONEN
  ========================= -->
      <section class="mb-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-4">Allgemeine Informationen</h2>

            <div id="bestellung-info">
              <!-- Wird dynamisch geladen -->
              <p class="text-muted mb-0">Lade Bestelldaten...</p>
            </div>
          </div>
        </div>
      </section>

      <!-- =========================
       LIEFERADRESSE
  ========================= -->
      <section class="mb-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-4">Lieferadresse</h2>

            <div id="lieferadresse-info">
              <!-- Wird dynamisch geladen -->
              <p class="text-muted mb-0">Lade Lieferadresse...</p>
            </div>
          </div>
        </div>
      </section>

      <!-- =========================
       BESTELLPOSITIONEN
  ========================= -->
      <section class="mb-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-4">Bestellpositionen</h2>

            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Artikel-ID</th>
                    <th>Artikel</th>
                    <th>Anzahl</th>
                    <th>Einzelpreis</th>
                    <th>Gesamtpreis</th>
                  </tr>
                </thead>
                <tbody id="positionen-tabelle">
                  <!-- Wird dynamisch mit JavaScript gefüllt -->
                  <tr>
                    <td colspan="5" class="text-center">
                      Lade Positionen...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <!-- =========================
       NAVIGATION / ZURÜCK
  ========================= -->
      <section>
        <div class="d-flex justify-content-between flex-wrap gap-2">
          <a href="adminbestellungen.html" class="btn btn-outline-secondary">
            Zurück zur Bestellverwaltung
          </a>
        </div>
      </section>

    </div>


  </main>

  <!-- =========================
       FOOTER (dynamisch geladen)
  ========================= -->

  <div id="footer-placeholder"></div>

  <!-- =========================
     SCRIPTS / FUNKTIONALITÄT
  ========================= -->

  <!-- Lädt Header & Footer -->
  <script src="js/include.js"></script>

  <!-- Zentrale Authentifizierungslogik (Session, Login, Admin, Logout) -->
  <script src="js/utils/auth.js"></script>

  <!-- Zentrale URL-Parameter-Logik -->
  <script src="js/utils/url.js"></script>

  <!-- Zentrale Formatierungslogik -->
  <script src="js/utils/format.js"></script>

  <!-- Zentrale Tabellen-Logik (Empty / Error States) -->
  <script src="js/utils/table.js"></script>

  <!-- Zentrale UI-Logik für Meldungen und Fehlerausgaben -->
  <script src="js/utils/ui.js"></script>

  <!-- Session prüfen & Header dynamisch anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für Dropdown-Menü laden -->
  <script src="js/kategorien.js"></script>

  <!-- Bestelldetails -->
  <script src="js/adminbestelldetails.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
