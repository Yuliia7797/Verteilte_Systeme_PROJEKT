<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Artikel - MyShop</title>

  <!-- Bootstrap CSS für Layout und responsive Darstellung -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons für Symbole -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eigene CSS-Datei -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Platzhalter für den Header -->
  <div id="header-placeholder"></div>

  <main class="py-5">
    <div class="container">
      <!-- Bereich mit Überschrift und Button für neue Artikel -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title mb-0">Artikelverwaltung</h1>
        <button class="btn btn-main" id="neuer-artikel-button">Neuen Artikel</button>
      </div>

      <!-- Tabelle für alle vorhandenen Artikel -->
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Bild</th>
                  <th>Bezeichnung</th>
                  <th>Preis</th>
                  <th>Kategorie</th>
                  <th>Aktion</th>
                </tr>
              </thead>
              <tbody id="artikel-tabelle">
                <!-- Die Artikeldaten werden später mit JavaScript eingefügt -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Formular zum Bearbeiten oder Anlegen eines Artikels -->
      <div class="card shadow-sm mt-4" id="artikel-formular-bereich" style="display: none;">
        <div class="card-body">
          <h2 class="h4 mb-4" id="formular-ueberschrift">Artikel bearbeiten</h2>

          <form id="artikel-formular">
            <!-- Verstecktes Feld für die Artikel-ID -->
            <input type="hidden" id="artikel-id">

            <!-- Verstecktes Feld für das aktuelle Bild -->
            <input type="hidden" id="aktuelles-bild-url">

            <div class="row g-3">
              <!-- Auswahlfeld für die Kategorie -->
              <div class="col-md-6">
                <label for="kategorie-id" class="form-label">Kategorie</label>
                <select class="form-select" id="kategorie-id" required>
                  <option value="">Bitte auswählen</option>
                </select>
              </div>

              <!-- Feld für die Bezeichnung -->
              <div class="col-md-6">
                <label for="bezeichnung" class="form-label">Bezeichnung</label>
                <input type="text" class="form-control" id="bezeichnung" required>
              </div>

              <!-- Feld für den Preis -->
              <div class="col-md-6">
                <label for="preis" class="form-label">Preis</label>
                <input type="number" step="0.01" class="form-control" id="preis" required>
              </div>

              <!-- Feld für Bild-Upload -->
              <div class="col-md-6">
                <label for="bild-datei" class="form-label">Bild-Datei</label>
                <input type="file" class="form-control" id="bild-datei" accept="image/*">
              </div>

              <!-- Bildvorschau -->
              <div class="col-12" id="bild-vorschau-bereich" style="display: none;">
                <label class="form-label">Aktuelles Bild</label>
                <div>
                  <img
                    id="bild-vorschau"
                    src=""
                    alt="Artikelbild"
                    style="max-width: 200px; height: auto; border-radius: 8px;"
                  >
                </div>
              </div>

              <!-- Feld für die kurze Beschreibung -->
              <div class="col-12">
                <label for="beschreibung" class="form-label">Beschreibung</label>
                <textarea class="form-control" id="beschreibung" rows="3"></textarea>
              </div>

              <!-- Feld für die lange Beschreibung -->
              <div class="col-12">
                <label for="langbeschreibung" class="form-label">Langbeschreibung</label>
                <textarea class="form-control" id="langbeschreibung" rows="5"></textarea>
              </div>
            </div>

            <!-- Buttons -->
            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-main">Speichern</button>
              <button type="button" class="btn btn-outline-secondary" id="abbrechen-button">Abbrechen</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Platzhalter für den Footer -->
  <div id="footer-placeholder"></div>

  <!-- Header und Footer laden -->
  <script src="js/include.js"></script>

  <!-- Session prüfen und Header anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für das Dropdown-Menü im Header laden -->
  <script src="js/kategorien.js"></script>

  <!-- JavaScript für die Artikelverwaltung -->
  <script src="js/adminartikel.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
