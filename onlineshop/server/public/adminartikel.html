<!--
  Datei: adminartikel.html
  Beschreibung: Verwaltungsseite für Artikel im Admin-Bereich.
    Ermöglicht das Anzeigen, Anlegen, Bearbeiten und Verwalten
    von Artikeln inklusive Kategorie, Preis, Bild und Beschreibung.
  Hinweise:
    - Verwendet Bootstrap für Layout, Formulare und Tabellen
    - Artikeldaten werden dynamisch mit JavaScript geladen
    - Das Formular dient sowohl zum Erstellen als auch zum Bearbeiten
    - Header und Footer werden dynamisch geladen (include.js)
  Autor: Anastasiia Mavrodi, Yuliia Shostak, Lea Seiler
  Erstellt: 05.04.2026
-->

<!DOCTYPE html>

<html lang="de">

<!-- =========================
     HEAD / METADATEN & STYLES
========================= -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Artikel - MyShop</title>

  <!-- Bootstrap CSS (Layout & Responsivität) -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (Symbole) -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Eigenes Stylesheet -->

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- =========================
       HEADER (dynamisch geladen)
  ========================= -->

  <div id="header-placeholder"></div>

  <!-- =========================
       HAUPTINHALT ARTIKELVERWALTUNG
  ========================= -->

  <main class="py-5">
    <div class="container">

      ```
      <!-- Kopfbereich mit Seitentitel und Button zum Anlegen eines neuen Artikels -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title mb-0">Artikelverwaltung</h1>
        <button class="btn btn-main" id="neuer-artikel-button">
          Neuen Artikel
        </button>
      </div>

      <!-- =========================
       ARTIKELTABELLE
  ========================= -->
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Bild</th>
                  <th>Bezeichnung</th>
                  <th>Preis</th>
                  <th>Kategorie</th>
                  <th>Aktion</th>
                </tr>
              </thead>
              <tbody id="artikel-tabelle">
                <!-- Artikeldaten werden dynamisch mit JavaScript eingefügt -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- =========================
       FORMULAR FÜR ARTIKEL
  ========================= -->
      <div class="card shadow-sm mt-4" id="artikel-formular-bereich" style="display: none;">
        <div class="card-body">
          <h2 class="h4 mb-4" id="formular-ueberschrift">
            Artikel bearbeiten
          </h2>

          <form id="artikel-formular">

            <!-- Versteckte Felder für interne Daten -->
            <input type="hidden" id="artikel-id">
            <input type="hidden" id="aktuelles-bild-url">

            <div class="row g-3">

              <!-- Kategorieauswahl -->
              <div class="col-md-6">
                <label for="kategorie-id" class="form-label">Kategorie</label>
                <select class="form-select" id="kategorie-id" required>
                  <option value="">Bitte auswählen</option>
                </select>
              </div>

              <!-- Bezeichnung des Artikels -->
              <div class="col-md-6">
                <label for="bezeichnung" class="form-label">Bezeichnung</label>
                <input type="text" class="form-control" id="bezeichnung" required>
              </div>

              <!-- Preis des Artikels -->
              <div class="col-md-6">
                <label for="preis" class="form-label">Preis</label>
                <input type="number" step="0.01" class="form-control" id="preis" required>
              </div>

              <!-- Bild-Upload -->
              <div class="col-md-6">
                <label for="bild-datei" class="form-label">Bild-Datei</label>
                <input type="file" class="form-control" id="bild-datei" accept="image/*">
              </div>

              <!-- Vorschau des aktuell gespeicherten oder hochgeladenen Bildes -->
              <div class="col-12" id="bild-vorschau-bereich" style="display: none;">
                <label class="form-label">Aktuelles Bild</label>
                <div>
                  <img id="bild-vorschau" src="" alt="Artikelbild"
                    style="max-width: 200px; height: auto; border-radius: 8px;">
                </div>
              </div>

              <!-- Kurze Beschreibung -->
              <div class="col-12">
                <label for="beschreibung" class="form-label">Beschreibung</label>
                <textarea class="form-control" id="beschreibung" rows="3"></textarea>
              </div>

              <!-- Ausführliche Beschreibung -->
              <div class="col-12">
                <label for="langbeschreibung" class="form-label">
                  Langbeschreibung
                </label>
                <textarea class="form-control" id="langbeschreibung" rows="5"></textarea>
              </div>

            </div>

            <!-- Aktionen für Speichern oder Abbrechen -->
            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-main">Speichern</button>
              <button type="button" class="btn btn-outline-secondary" id="abbrechen-button">
                Abbrechen
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
    ```

  </main>

  <!-- =========================
       FOOTER (dynamisch geladen)
  ========================= -->

  <div id="footer-placeholder"></div>

  <!-- =========================
       SCRIPTS / FUNKTIONALITÄT
  ========================= -->

  <!-- Lädt Header & Footer -->
  <script src="js/include.js"></script>

  <!-- Zentrale Authentifizierungslogik (Session, Login, Admin, Logout) -->
  <script src="js/utils/auth.js"></script>

  <!-- Session prüfen & Header dynamisch anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für Dropdown-Menü laden -->
  <script src="js/kategorien.js"></script>

  <!-- Zentrale Formatierungslogik -->
  <script src="js/utils/format.js"></script>

  <!-- Artikelverwaltung -->
  <script src="js/adminartikel.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
