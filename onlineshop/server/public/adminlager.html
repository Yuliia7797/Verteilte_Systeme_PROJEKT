<!DOCTYPE html>

<html lang="de">

<!-- =========================
     HEAD / METADATEN & STYLES
========================= -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Lager - MyShop</title>

  <!-- Bootstrap CSS (Layout & Responsivität) -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (Symbole) -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Eigenes Stylesheet -->

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- =========================
       HEADER (dynamisch geladen)
  ========================= -->

  <div id="header-placeholder"></div>

  <!-- =========================
       HAUPTINHALT LAGERVERWALTUNG
  ========================= -->

  <main class="py-5">
    <div class="container">

      <!-- Seitentitel -->
      <h1 class="section-title text-center mb-5">Lagerverwaltung</h1>

      <!-- =========================
           LAGERBESTAND-TABELLE
      ========================= -->
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Artikel-ID</th>
                  <th>Artikelname</th>
                  <th>Aktueller Bestand</th>
                  <th>Neuer Bestand</th>
                  <th>Aktion</th>
                </tr>
              </thead>
              <tbody id="lagerbestand-tabelle">
                <!-- Wird dynamisch mit JavaScript gefüllt -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- =========================
       FOOTER (dynamisch geladen)
  ========================= -->

  <div id="footer-placeholder"></div>

  <!-- =========================
     SCRIPTS / FUNKTIONALITÄT
  ========================= -->

  <!-- Lädt Header & Footer -->
  <script src="js/include.js"></script>

  <!-- Zentrale Authentifizierungslogik (Session, Login, Admin, Logout) -->
  <script src="js/utils/auth.js"></script>

  <!-- Zentrale Tabellen-Logik (Empty / Error States) -->
  <script src="js/utils/table.js"></script>

  <!-- Session prüfen & Header dynamisch anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für Dropdown-Menü laden -->
  <script src="js/kategorien.js"></script>

  <!-- Lagerverwaltung -->
  <script src="js/adminlager.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
