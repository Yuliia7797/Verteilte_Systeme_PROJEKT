<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Lager - MyShop</title>

  <!-- Bootstrap CSS für Layout und responsive Darstellung -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons für Symbole -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eigene CSS-Datei -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Platzhalter für den Header -->
  <div id="header-placeholder"></div>

  <main class="py-5">
    <div class="container">
      <!-- Überschrift der Seite -->
      <h1 class="section-title text-center mb-5">Lagerverwaltung</h1>

      <!-- Tabelle für den Lagerbestand -->
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Artikel-ID</th>
                  <th>Artikelname</th>
                  <th>Aktueller Bestand</th>
                  <th>Neuer Bestand</th>
                  <th>Aktion</th>
                </tr>
              </thead>
              <tbody id="lagerbestand-tabelle">
                <!-- Die Daten werden später mit JavaScript eingefügt -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Platzhalter für den Footer -->
  <div id="footer-placeholder"></div>

  <!-- Header und Footer laden -->
  <script src="js/include.js"></script>

  <!-- JavaScript zum Prüfen der Session und Anpassen des Headers -->
  <script src="js/auth-header.js"></script>

  <!-- JavaScript für das Suchformular im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für das Dropdown-Menü im Header laden -->
  <script src="js/kategorien.js"></script>

  <!-- JavaScript für die Lagerverwaltung -->
  <script src="js/adminlager.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
