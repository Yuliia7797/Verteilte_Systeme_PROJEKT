<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Kategorien - MyShop</title>

  <!-- Bootstrap CSS für Layout und responsive Darstellung -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons für Symbole -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eigene CSS-Datei -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Platzhalter für den Header -->
  <div id="header-placeholder"></div>

  <main class="py-5">
    <div class="container">
      <!-- Überschrift und Button -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title mb-0">Kategorienverwaltung</h1>
        <button class="btn btn-main" id="neue-kategorie-button">Neue Kategorie</button>
      </div>

      <!-- Tabelle -->
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Bezeichnung</th>
                  <th>Aktion</th>
                </tr>
              </thead>
              <tbody id="kategorien-tabelle">
                <!-- Wird per JavaScript gefüllt -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Formular -->
      <div class="card shadow-sm mt-4" id="kategorie-formular-bereich" style="display: none;">
        <div class="card-body">
          <h2 class="h4 mb-4">Neue Kategorie anlegen</h2>

          <form id="kategorie-formular">
            <div class="mb-3">
              <label for="bezeichnung" class="form-label">Bezeichnung</label>
              <input type="text" class="form-control" id="bezeichnung" required>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-main">Speichern</button>
              <button type="button" class="btn btn-outline-secondary" id="abbrechen-button">Abbrechen</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Platzhalter für den Footer -->
  <div id="footer-placeholder"></div>

  <!-- Header und Footer laden -->
  <script src="js/include.js"></script>

  <!-- Session prüfen und Header anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für das Dropdown-Menü im Header laden -->
  <script src="js/kategorien.js"></script>

  <!-- Admin-Schutz -->
  <script src="js/admin.js"></script>

  <!-- JavaScript für Kategorienverwaltung -->
  <script src="js/adminkategorien.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
