<!DOCTYPE html>

<html lang="de">

<!-- =========================
     HEAD / METADATEN & STYLES
========================= -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Kategorien - MyShop</title>

  <!-- Bootstrap CSS (Layout & Responsivität) -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (Symbole) -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Eigenes Stylesheet -->

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- =========================
       HEADER (dynamisch geladen)
  ========================= -->

  <div id="header-placeholder"></div>

  <!-- =========================
       HAUPTINHALT KATEGORIENVERWALTUNG
  ========================= -->

  <main class="py-5">
    <div class="container">

      
      <!-- Kopfbereich mit Titel und Button -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title mb-0">Kategorienverwaltung</h1>
        <button class="btn btn-main" id="neue-kategorie-button">
          Neue Kategorie
        </button>
      </div>

      <!-- =========================
       KATEGORIEN-TABELLE
  ========================= -->
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Bezeichnung</th>
                  <th>Aktion</th>
                </tr>
              </thead>
              <tbody id="kategorien-tabelle">
                <!-- Wird dynamisch mit JavaScript gefüllt -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- =========================
       FORMULAR FÜR KATEGORIEN
  ========================= -->
      <div class="card shadow-sm mt-4" id="kategorie-formular-bereich" style="display: none;">
        <div class="card-body">
          <h2 class="h4 mb-4">Neue Kategorie anlegen</h2>

          <form id="kategorie-formular">

            <!-- Eingabefeld für Bezeichnung -->
            <div class="mb-3">
              <label for="bezeichnung" class="form-label">
                Bezeichnung
              </label>
              <input type="text" class="form-control" id="bezeichnung" required>
            </div>

            <!-- Aktionen -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-main">
                Speichern
              </button>
              <button type="button" class="btn btn-outline-secondary" id="abbrechen-button">
                Abbrechen
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
    

  </main>

  <!-- =========================
       FOOTER (dynamisch geladen)
  ========================= -->

  <div id="footer-placeholder"></div>

  <!-- =========================
       SCRIPTS / FUNKTIONALITÄT
  ========================= -->
  <!-- Lädt Header & Footer -->
  <script src="js/include.js"></script>

  <!-- Zentrale Authentifizierungslogik (Session, Login, Admin, Logout) -->
  <script src="js/utils/auth.js"></script>

  <!-- Session prüfen & Header dynamisch anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für Dropdown-Menü laden -->
  <script src="js/kategorien.js"></script>

  <!-- Kategorienverwaltung -->
  <script src="js/adminkategorien.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
