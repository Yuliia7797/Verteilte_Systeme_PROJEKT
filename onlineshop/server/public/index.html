<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShop</title>

  <!-- Bootstrap CSS für Layout, Grid und responsive Komponenten -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons für Symbole wie den Warenkorb -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eigene zentrale CSS-Datei -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!--
    Platzhalter für den Header.
    Der Inhalt wird später per JavaScript aus components/header.html geladen.
  -->
  <div id="header-placeholder"></div>

  <!-- Hauptinhalt der Startseite -->
  <main>
    <!-- Banner-Bereich -->
    <section class="hero-banner py-4">
      <div class="container">
        <div class="banner-box">
          <img
            src="images/banner-universal.png"
            alt="Universeller Shop Banner"
            class="img-fluid banner-img"
          >

          <!-- Text liegt über dem Bannerbild -->
          <div class="banner-overlay">
            <h1>Schnell, bequem, alles in einem Shop</h1>
            <p>
              Einfach auswählen und bequem online bestellen.
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- Kategorien-Bereich -->
    <section class="py-5">
      <div class="container">
        <h2 class="section-title text-center">Unsere Kategorien</h2>

        <!-- Container für Kategorien, die später per JavaScript aus der Datenbank geladen werden -->
        <div id="kategorien-container" class="row g-4"></div>
      </div>
    </section>

    <!-- Bereich für beliebte Artikel -->
    <section class="pb-5">
      <div class="container">
        <!-- Überschrift des Artikelbereichs -->
        <h2 class="section-title text-center">Beliebte Artikel</h2>

        <!--
          Dieser Container bleibt am Anfang leer.
          Die Artikelkarten werden später per JavaScript
          dynamisch aus der Datenbank geladen und hier eingefügt.
        -->
        <div id="artikel-container" class="row g-4"></div>
      </div>
    </section>
  </main>

  <!--
    Platzhalter für den Footer.
    Der Inhalt wird später per JavaScript aus components/footer.html geladen.
  -->
  <div id="footer-placeholder"></div>

  <!-- JavaScript für Header und Footer -->
  <script src="js/include.js"></script>

  <!-- JavaScript zum Laden der Artikel aus der Datenbank -->
  <script src="js/artikel.js"></script>

  <!-- JavaScript zum Laden der Kategorien aus der Datenbank -->
  <script src="js/kategorien.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
