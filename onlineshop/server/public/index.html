<!DOCTYPE html>

<html lang="de">

<!-- =========================
     HEAD / METADATEN & STYLES
========================= -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShop</title>

  <!-- Bootstrap CSS (Layout, Grid & Responsivität) -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (z. B. Warenkorb-Symbole) -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Eigenes zentrales Stylesheet -->

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- =========================
       HEADER (dynamisch geladen)
  ========================= -->

  <div id="header-placeholder"></div>

  <!-- =========================
       HAUPTINHALT STARTSEITE
  ========================= -->

  <main>


    <!-- =========================
     HERO-BANNER
========================= -->
    <section class="hero-banner py-4">
      <div class="container">
        <div class="banner-box">
          <img src="images/banner-universal.png" alt="Universeller Shop Banner" class="img-fluid banner-img">

          <!-- Text über dem Bannerbild -->
          <div class="banner-overlay">
            <h1>Schnell, bequem, alles in einem Shop</h1>
            <p>
              Einfach auswählen und bequem online bestellen.
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- =========================
     KATEGORIEN-BEREICH
========================= -->
    <section class="py-5">
      <div class="container">
        <h2 class="section-title text-center">Unsere Kategorien</h2>

        <!-- Wird dynamisch mit JavaScript gefüllt -->
        <div id="kategorien-container" class="row g-4"></div>
      </div>
    </section>

    <!-- =========================
     BELIEBTE ARTIKEL
========================= -->
    <section class="pb-5">
      <div class="container">
        <h2 class="section-title text-center">Beliebte Artikel</h2>

        <!-- Wird dynamisch mit JavaScript gefüllt -->
        <div id="artikel-container" class="row g-4"></div>
      </div>
    </section>


  </main>

  <!-- =========================
       FOOTER (dynamisch geladen)
  ========================= -->

  <div id="footer-placeholder"></div>

  <!-- =========================
       SCRIPTS / FUNKTIONALITÄT
  ========================= -->

  <!-- Lädt Header & Footer -->
  <script src="js/include.js"></script>

  <!-- Zentrale API-Kommunikation (GET, POST, PATCH, DELETE Requests) -->
  <script src="js/utils/api.js"></script>

  <!-- Zentrale Authentifizierungslogik (Session, Login, Admin, Logout) -->
  <script src="js/utils/auth.js"></script>

  <!-- Zentrale Formatierungslogik für Preise und Datumswerte -->
  <script src="js/utils/format.js"></script>

  <!-- Zentrale Warenkorb-Logik (Artikel zum Warenkorb hinzufügen) -->
  <script src="js/utils/warenkorb-actions.js"></script>

  <!-- Zentrale Komponente für einzelne Artikelkarten -->
  <script src="js/components/artikel-card.js"></script>

  <!-- Zentrale Logik zum Rendern von Artikellisten -->
  <script src="js/components/artikel-list.js"></script>

  <!-- Session prüfen & Header dynamisch anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für Dropdown-Menü laden -->
  <script src="js/kategorien.js"></script>

  <!-- Logik für die Artikelübersicht auf der Startseite -->
  <script src="js/artikel.js"></script>

  <!-- Bootstrap JS (Interaktionen) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
