<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShop – Warenkorb</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="py-5">
    <div class="container">
      <h2 class="section-title text-center mb-5">Dein Warenkorb</h2>

      <!-- Hier werden die echten DB-Produkte eingefügt -->
      <div id="warenkorb-container"></div>

      <!-- Summenbereich -->
      <div class="card p-4" id="warenkorb-summe">
        <div class="d-flex justify-content-between mb-2">
          <span>Zwischensumme</span>
          <strong id="zwischensumme">0,00 €</strong>
        </div>

        <div class="d-flex justify-content-between mb-2">
          <span>Versand</span>
          <strong id="versand">4,99 €</strong>
        </div>

        <hr>

        <div class="d-flex justify-content-between mb-4">
          <span>Gesamt</span>
          <strong id="gesamt">0,00 €</strong>
        </div>

        <div class="text-end">
          <a href="index.html" class="btn btn-light-custom me-2">
            Weiter einkaufen
          </a>

          <button class="btn btn-main">
            Zur Kasse
          </button>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/include.js"></script>
  <script src="js/auth-header.js"></script>
  <script src="js/suche.js"></script>
  <script src="js/kategorien.js"></script>

  <!-- Wichtig -->
  <script src="js/warenkorb.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
