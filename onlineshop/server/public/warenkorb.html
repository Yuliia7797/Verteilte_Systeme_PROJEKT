<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color:#f7f5ef;

color:#3f4742;
}

.navbar{
background-color:#dbe4dc !important;
padding-top:12px;
padding-bottom:12px;

}

.navbar-brand{
display:flex;

margin-right:30px;
}

.logo-img{

width:auto;

}

.nav-link{
color:#3f4742 !important;
font-weight:600;

}

.nav-link:hover{

}

.btn-main{

.btn-light-custom{

border-radius:30px;
padding:10px 18px;
}

.btn-light-custom:hover{

}

.cart-link{
