<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyShop – Warenkorb</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eure zentrale CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- HEADER (wird dynamisch geladen) -->
  <div id="header-placeholder"></div>

  <!-- WARENKORB -->
  <main class="py-5">
    <div class="container">

      <h2 class="section-title text-center mb-5">Dein Warenkorb</h2>

      <!-- PRODUKT 1 -->
      <div class="card p-4 mb-4">
        <div class="row align-items-center">

          <div class="col-md-2">
            <img src="https://via.placeholder.com/150" class="img-fluid rounded">
          </div>

          <div class="col-md-4">
            <h5>Notebook</h5>
            <p>Praktisch für Alltag und Studium</p>
          </div>

          <div class="col-md-2">
            <label>Menge</label>
            <input type="number" class="form-control" value="1">
          </div>

          <div class="col-md-2">
            <strong>599,99 €</strong>
          </div>

          <div class="col-md-2 text-end">
            <button class="btn btn-light-custom">Entfernen</button>
          </div>

        </div>
      </div>

      <!-- PRODUKT 2 -->
      <div class="card p-4 mb-4">
        <div class="row align-items-center">

          <div class="col-md-2">
            <img src="https://via.placeholder.com/150" class="img-fluid rounded">
          </div>

          <div class="col-md-4">
            <h5>Buch</h5>
            <p>Spannender Roman</p>
          </div>

          <div class="col-md-2">
            <label>Menge</label>
            <input type="number" class="form-control" value="2">
          </div>

          <div class="col-md-2">
            <strong>19,99 €</strong>
          </div>

          <div class="col-md-2 text-end">
            <button class="btn btn-light-custom">Entfernen</button>
          </div>

        </div>
      </div>

      <!-- SUMME -->
      <div class="card p-4">

        <div class="d-flex justify-content-between mb-2">
          <span>Zwischensumme</span>
          <strong>639,97 €</strong>
        </div>

        <div class="d-flex justify-content-between mb-2">
          <span>Versand</span>
          <strong>4,99 €</strong>
        </div>

        <hr>

        <div class="d-flex justify-content-between mb-4">
          <span>Gesamt</span>
          <strong>644,96 €</strong>
        </div>

        <div class="text-end">

          <a href="index.html" class="btn btn-light-custom me-2">
            Weiter einkaufen
          </a>

          <button class="btn btn-main">
            Zur Kasse
          </button>

        </div>

      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- SCRIPTS (GANZ WICHTIG!) -->

  <!-- lädt header.html & footer.html -->
  <script src="js/include.js"></script>

  <!-- Header-Funktionen -->
  <script src="js/suche.js"></script>
  <script src="js/kategorien.js"></script>

  <!-- (optional später für Warenkorb-Logik) -->
  <!-- <script src="js/warenkorb.js"></script> -->

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
