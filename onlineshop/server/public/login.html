<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="header-placeholder"></div>

  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <h1 class="section-title text-center mb-4">Anmelden</h1>

          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <form id="login-form">
                <div class="mb-3">
                  <label for="email" class="form-label">E-Mail</label>
                  <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="mb-3">
                  <label for="passwort" class="form-label">Passwort</label>
                  <input type="password" class="form-control" id="passwort" name="passwort" required>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-dark">Anmelden</button>
                </div>
              </form>

              <div id="meldung" class="mt-3 text-center"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Platzhalter für den Footer -->
  <div id="footer-placeholder"></div>

  <!-- JavaScript für Header und Footer -->
  <script src="js/include.js"></script>

  <!-- JavaScript zum Prüfen der Session und Anpassen des Headers je nach Login-Status -->
  <script src="js/auth-header.js"></script>

  <!-- JavaScript für das Suchformular im Header -->
  <script src="js/suche.js"></script>

  <!-- JavaScript zum Laden der Kategorien für das Dropdown-Menü im Header -->
  <script src="js/kategorien.js"></script>

  <!-- JavaScript für Registrierung -->
  <script src="js/registrieren.js"></script>
  
  <!-- JavaScript für Login -->
  <script src="js/login.js"></script>
  
  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
