    <!-- Login-Box -->
    <div class="col-lg-6 col-md-8">
      <h1 class="section-title text-center mb-4">Anmelden</h1>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">

          <!-- Login-Formular -->
          <form id="login-form">

            <div class="mb-3">
              <label for="email" class="form-label">E-Mail</label>
              <input
                type="email"
                class="form-control"
                id="email"
                name="email"
                required
              >
            </div>

            <div class="mb-3">
              <label for="passwort" class="form-label">Passwort</label>
              <input
                type="password"
                class="form-control"
                id="passwort"
                name="passwort"
                required
              >
            </div>

            <!-- Login-Button -->
            <div class="d-grid">
              <button type="submit" class="btn btn-dark">
                Anmelden
              </button>
            </div>

          </form>

          <!-- Meldungen (z. B. Fehler / Erfolg) -->
          <div id="meldung" class="mt-3 text-center"></div>

        </div>
      </div>
    </div>

  </div>
</div>
