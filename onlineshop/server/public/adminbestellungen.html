<!--
  Datei: adminbestellungen.html
  Beschreibung: Diese Datei stellt die Admin-Seite für die Bestellverwaltung dar.
    Sie zeigt eine Tabelle mit allen Bestellungen an.
    Die Daten werden über adminbestellungen.js vom Backend geladen und auf dieser Seite dargestellt.
  Autor: Anastasiia Mavrodi, Yuliia Shostak, Lea Seiler
  Datum: 05.04.2026
-->

<!DOCTYPE html>

<html lang="de">

<!-- =========================
     HEAD / METADATEN & STYLES
========================= -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestellverwaltung - MyShop</title>

  <!-- Bootstrap CSS (Layout & Responsivität) -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (Symbole) -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Eigenes Stylesheet -->

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- =========================
       HEADER (dynamisch geladen)
  ========================= -->

  <div id="header-placeholder"></div>

  <!-- =========================
       HAUPTINHALT BESTELLVERWALTUNG
  ========================= -->

  <main class="py-5">
    <div class="container">


      <!-- Seitentitel -->
      <h1 class="section-title text-center mb-5">Bestellverwaltung</h1>

      <!-- =========================
       BESTELLÜBERSICHT
  ========================= -->
      <section>
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-4">Übersicht aller Bestellungen</h2>

            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Bestell-ID</th>
                    <th>Kunde</th>
                    <th>E-Mail</th>
                    <th>Gesamtpreis</th>
                    <th>Zahlungsmethode</th>
                    <th>Zahlungsstatus</th>
                    <th>Bestellstatus</th>
                    <th>Erstellt am</th>
                    <th>Details</th>
                  </tr>
                </thead>
                <tbody id="bestellungen-tabelle">
                  <!-- Wird dynamisch mit JavaScript gefüllt -->
                  <tr>
                    <td colspan="9" class="text-center">
                      Lade Bestellungen...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

    </div>


  </main>

  <!-- =========================
       FOOTER (dynamisch geladen)
  ========================= -->

  <div id="footer-placeholder"></div>

  <!-- =========================
     SCRIPTS / FUNKTIONALITÄT
  ========================= -->

  <!-- Lädt Header & Footer -->
  <script src="js/include.js"></script>

  <!-- Zentrale Authentifizierungslogik (Session, Login, Admin, Logout) -->
  <script src="js/utils/auth.js"></script>

  <!-- Zentrale Formatierungslogik -->
  <script src="js/utils/format.js"></script>

  <!-- Zentrale Tabellen-Logik (Empty / Error States) -->
  <script src="js/utils/table.js"></script>

  <!-- Zentrale UI-Logik für Meldungen und Fehlerausgaben -->
  <script src="js/utils/ui.js"></script>

  <!-- Session prüfen & Header dynamisch anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für Dropdown-Menü laden -->
  <script src="js/kategorien.js"></script>

  <!-- Bestellungen -->
  <script src="js/adminbestellungen.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
