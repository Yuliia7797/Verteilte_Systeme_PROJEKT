<!DOCTYPE html>
<!--
  Diese Datei stellt die Admin-Seite für die Bestellverwaltung dar.
  Sie zeigt eine Tabelle mit allen Bestellungen an.
  Die Daten werden über adminbestellungen.js vom Backend geladen
  und auf dieser Seite dargestellt.
-->
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bestellverwaltung - MyShop</title>

  <!-- Bootstrap CSS für Layout und responsive Darstellung -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons für Symbole -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eigene CSS-Datei -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Platzhalter für den Header -->
  <div id="header-placeholder"></div>

  <main class="py-5">
    <div class="container">
      <!-- Überschrift der Seite -->
      <h1 class="section-title text-center mb-5">Bestellverwaltung</h1>

      <!-- Bereich für die Bestell-Tabelle -->
      <section>
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-4">Übersicht aller Bestellungen</h2>

            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Bestell-ID</th>
                    <th>Kunde</th>
                    <th>E-Mail</th>
                    <th>Gesamtpreis</th>
                    <th>Zahlungsmethode</th>
                    <th>Zahlungsstatus</th>
                    <th>Bestellstatus</th>
                    <th>Erstellt am</th>
                    <th>Details</th>
                  </tr>
                </thead>
                <tbody id="bestellungen-tabelle">
                  <tr>
                    <td colspan="9" class="text-center">Lade Bestellungen...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Platzhalter für den Footer -->
  <div id="footer-placeholder"></div>

  <!-- Header und Footer laden -->
  <script src="js/include.js"></script>

  <!-- Session prüfen und Header anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für das Dropdown-Menü im Header laden -->
  <script src="js/kategorien.js"></script>

  <!-- Admin-Zugriff prüfen -->
  <script src="js/admin.js"></script>

  <!-- JavaScript für die Bestellverwaltung -->
  <script src="js/adminbestellungen.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
