<!--
  Datei: adminworker.html
  Beschreibung: Diese Datei stellt die Admin-Seite für die Worker-Übersicht dar.
    Sie zeigt eine Tabelle mit allen Workern sowie eine Tabelle mit
    den vorhandenen Aufgaben an. Die Daten werden über adminworker.js
    vom Backend geladen und auf dieser Seite angezeigt.
  Autor: Anastasiia Mavrodi, Yuliia Shostak, Lea Seiler
  Datum: 05.04.2026
-->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker-Status - MyShop</title>

  <!-- Bootstrap CSS für Layout und responsive Darstellung -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons für Symbole -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eigene CSS-Datei -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Platzhalter für den Header -->
  <div id="header-placeholder"></div>

  <main class="py-5">
    <div class="container">
      <!-- Überschrift der Seite -->
      <h1 class="section-title text-center mb-5">Worker-Status</h1>

      <!-- Bereich für die Worker-Tabelle -->
      <section class="mb-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-4">Übersicht der Worker</h2>

            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Worker-ID</th>
                    <th>Typ</th>
                    <th>Status</th>
                    <th>Letzte Aktivität</th>
                    <th>Aktion</th>
                  </tr>
                </thead>
                <tbody id="worker-tabelle">
                  <tr>
                    <td colspan="5" class="text-center">Lade Worker-Daten...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <!-- Bereich für die Aufgaben-Tabelle -->
      <section>
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-4">Übersicht der Aufgaben</h2>

            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Aufgaben-ID</th>
                    <th>Typ</th>
                    <th>Status</th>
                    <th>Worker-ID</th>
                    <th>Versuche</th>
                    <th>Fehlermeldung</th>
                    <th>Erstellt am</th>
                  </tr>
                </thead>
                <tbody id="aufgaben-tabelle">
                  <tr>
                    <td colspan="7" class="text-center">Lade Aufgaben-Daten...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Platzhalter für den Footer -->
  <div id="footer-placeholder"></div>

  <!-- Header und Footer laden -->
  <script src="js/include.js"></script>

  <!-- Session prüfen und Header anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für das Dropdown-Menü im Header laden -->
  <script src="js/kategorien.js"></script>

  <!-- Admin-Zugriff prüfen -->
  <script src="js/admin.js"></script>

  <!-- JavaScript für die Worker-Seite -->
  <script src="js/adminworker.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
