<!--
  Datei: adminworker.html
  Beschreibung: Diese Datei stellt die Admin-Seite für die Worker-Übersicht dar.
    Sie zeigt eine Tabelle mit allen Workern sowie eine Tabelle mit
    den vorhandenen Aufgaben an. Die Daten werden über adminworker.js
    vom Backend geladen und auf dieser Seite angezeigt.

    Zusätzlich wird auf dieser Seite die Socket.IO-Clientbibliothek geladen,
    damit Änderungen an Workern und Aufgaben in Echtzeit angezeigt werden können.

  Autor: Anastasiia Mavrodi, Yuliia Shostak, Lea Seiler
  Datum: 05.04.2026
-->

<!DOCTYPE html>

<html lang="de">

<!-- =========================
     HEAD / METADATEN & STYLES
========================= -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker-Status - MyShop</title>

  <!-- Bootstrap CSS (Layout & Responsivität) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (Symbole) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Eigenes Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- =========================
       HEADER (dynamisch geladen)
  ========================= -->

  <div id="header-placeholder"></div>

  <!-- =========================
       HAUPTINHALT WORKER-ÜBERSICHT
  ========================= -->

  <main class="py-5">
    <div class="container">

      <!-- Seitentitel -->
      <h1 class="section-title text-center mb-5">Worker-Status</h1>

      <!-- =========================
           WORKER-TABELLE
      ========================= -->
      <section class="mb-5">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-4">Übersicht der Worker</h2>

            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Worker-ID</th>
                    <th>Typ</th>
                    <th>Status</th>
                    <th>Letzte Aktivität</th>
                    <th>Aktion</th>
                  </tr>
                </thead>
                <tbody id="worker-tabelle">
                  <!-- Wird dynamisch mit JavaScript gefüllt -->
                  <tr>
                    <td colspan="5" class="text-center">
                      Lade Worker-Daten...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <!-- =========================
           AUFGABEN-TABELLE
      ========================= -->
      <section>
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h4 mb-4">Übersicht der Aufgaben</h2>

            <div class="table-responsive">
              <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Aufgaben-ID</th>
                    <th>Typ</th>
                    <th>Status</th>
                    <th>Worker-ID</th>
                    <th>Versuche</th>
                    <th>Fehlermeldung</th>
                    <th>Erstellt am</th>
                  </tr>
                </thead>
                <tbody id="aufgaben-tabelle">
                  <!-- Wird dynamisch mit JavaScript gefüllt -->
                  <tr>
                    <td colspan="7" class="text-center">
                      Lade Aufgaben-Daten...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

    </div>
  </main>

  <!-- =========================
       FOOTER (dynamisch geladen)
  ========================= -->

  <div id="footer-placeholder"></div>

  <!-- =========================
       SCRIPTS / FUNKTIONALITÄT
  ========================= -->

  <!-- Lädt Header & Footer -->
  <script src="js/include.js"></script>

  <!-- Zentrale Authentifizierungslogik (Session, Login, Admin, Logout) -->
  <script src="js/utils/auth.js"></script>

  <!-- Zentrale Formatierungslogik -->
  <script src="js/utils/format.js"></script>

  <!-- Zentrale Tabellen-Logik (Empty / Error States) -->
  <script src="js/utils/table.js"></script>

  <!-- Session prüfen & Header dynamisch anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für Dropdown-Menü laden -->
  <script src="js/kategorien.js"></script>

  <!-- Socket.IO-Client für Echtzeit-Kommunikation -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Worker-Verwaltung -->
  <script src="js/adminworker.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
