<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produktdetails - MyShop</title>

  <!-- Bootstrap CSS für Layout und responsive Darstellung -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons für Symbole -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eigene CSS-Datei -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Platzhalter für den Header -->
  <div id="header-placeholder"></div>

  <main class="py-5">
    <div class="container">
      <!--
        Dieser Bereich bleibt zuerst leer.
        Die Produktdetails werden später per JavaScript geladen.
      -->
      <div id="product-detail-container"></div>
    </div>
  </main>

  <!-- Platzhalter für den Footer -->
  <div id="footer-placeholder"></div>

  <!-- Header und Footer laden -->
  <script src="js/include.js"></script>

  <!-- Produktdetails laden -->
  <script src="js/product-detail.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
