<!--
  Datei: adminbenutzer.html
  Beschreibung: Verwaltungsseite für Benutzer im Admin-Bereich.
    Ermöglicht das Anzeigen aller registrierten Benutzer
    sowie das Anlegen neuer Benutzer mit einer Rolle.
  Hinweise:
    - Verwendet Bootstrap für Layout, Formulare und Tabellen
    - Benutzerdaten werden dynamisch mit JavaScript geladen
    - Das Formular dient zum Anlegen neuer Benutzer
    - Header und Footer werden dynamisch geladen (include.js)
    - Zugriff wird über admin.js geschützt
  Autor: Anastasiia Mavrodi, Yuliia Shostak, Lea Seiler
  Erstellt: 16.04.2026
-->

<!DOCTYPE html>

<html lang="de">

<!-- =========================
     HEAD / METADATEN & STYLES
========================= -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Benutzer - MyShop</title>

  <!-- Bootstrap CSS (Layout & Responsivität) -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (Symbole) -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Eigenes Stylesheet -->

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- =========================
       HEADER (dynamisch geladen)
  ========================= -->

  <div id="header-placeholder"></div>

  <!-- =========================
       HAUPTINHALT BENUTZERVERWALTUNG
  ========================= -->

  <main class="py-5">
    <div class="container">

      <!-- Kopfbereich mit Seitentitel und Button zum Anlegen eines neuen Benutzers -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title mb-0">Benutzerverwaltung</h1>
        <button class="btn btn-main" id="neuer-benutzer-button">
          Neuen Benutzer
        </button>
      </div>

      <!-- =========================
           BENUTZERTABELLE
      ========================= -->
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>E-Mail</th>
                  <th>Rolle</th>
                  <th>Adresse</th>
                  <th>Erstellt am</th>
                </tr>
              </thead>
              <tbody id="benutzer-tabelle">
                <!-- Benutzerdaten werden dynamisch mit JavaScript eingefügt -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- =========================
           FORMULAR FÜR NEUEN BENUTZER
      ========================= -->
      <div class="card shadow-sm mt-4" id="benutzer-formular-bereich" style="display: none;">
        <div class="card-body">
          <h2 class="h4 mb-4">Neuen Benutzer anlegen</h2>

          <form id="benutzer-formular">
            <div class="row g-3">

              <!-- Vorname -->
              <div class="col-md-6">
                <label for="vorname" class="form-label">Vorname</label>
                <input type="text" class="form-control" id="vorname" required>
              </div>

              <!-- Nachname -->
              <div class="col-md-6">
                <label for="nachname" class="form-label">Nachname</label>
                <input type="text" class="form-control" id="nachname" required>
              </div>

              <!-- E-Mail -->
              <div class="col-md-6">
                <label for="email" class="form-label">E-Mail</label>
                <input type="email" class="form-control" id="email" required>
              </div>

              <!-- Passwort -->
              <div class="col-md-6">
                <label for="passwort" class="form-label">Passwort</label>
                <input type="password" class="form-control" id="passwort" required>
              </div>

              <!-- Rollen-Auswahl -->
              <div class="col-md-6">
                <label for="rolle" class="form-label">Rolle</label>
                <select class="form-select" id="rolle" required>
                  <option value="">Bitte auswählen</option>
                  <option value="kunde">Kunde</option>
                  <option value="admin">Admin</option>
                </select>
              </div>

            </div>

            <!-- Aktionen für Speichern oder Abbrechen -->
            <div class="mt-4 d-flex gap-2">
              <button type="submit" class="btn btn-main">Speichern</button>
              <button type="button" class="btn btn-outline-secondary" id="abbrechen-button">
                Abbrechen
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </main>

  <!-- =========================
       FOOTER (dynamisch geladen)
  ========================= -->

  <div id="footer-placeholder"></div>

  <!-- =========================
       SCRIPTS / FUNKTIONALITÄT
  ========================= -->

  <!-- Lädt Header & Footer -->
  <script src="js/include.js"></script>

  <!-- Zentrale Authentifizierungslogik (Session, Login, Admin, Logout) -->
  <script src="js/utils/auth.js"></script>

  <!-- Zentrale Formular-Logik -->
  <script src="js/utils/forms.js"></script>

  <!-- Zentrale Formatierungslogik -->
  <script src="js/utils/format.js"></script>

  <!-- Zentrale Tabellen-Logik (Empty / Error States) -->
  <script src="js/utils/table.js"></script>

  <!-- Zentrale UI-Logik für Meldungen und Fehlerausgaben -->
  <script src="js/utils/ui.js"></script>

  <!-- Session prüfen & Header dynamisch anpassen -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion im Header -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für Dropdown-Menü laden -->
  <script src="js/kategorien.js"></script>

  <!-- Admin-Zugriffsprüfung -->
  <script src="js/admin.js"></script>

  <!-- Benutzerverwaltung -->
  <script src="js/adminbenutzer.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
