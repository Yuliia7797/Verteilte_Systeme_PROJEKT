<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kategorie - MyShop</title>

  <!-- Bootstrap CSS für Layout, Grid und responsive Darstellung -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons für Symbole -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eigene zentrale CSS-Datei -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!--
    Platzhalter für den Header.
    Der Inhalt wird später per JavaScript aus components/header.html geladen.
  -->
  <div id="header-placeholder"></div>

  <!-- Hauptinhalt der Kategorieseite -->
  <main class="py-5">
    <div class="container">
      <!--
        Überschrift der aktuellen Kategorie.
        Der Name der Kategorie wird später per JavaScript gesetzt.
      -->
      <h1 id="kategorie-title" class="section-title text-center mb-5">Kategorie</h1>

      <!--
        Dieser Container bleibt am Anfang leer.
        Die Artikel der ausgewählten Kategorie werden später
        per JavaScript dynamisch aus der Datenbank geladen.
      -->
      <div id="kategorie-artikel-container" class="row g-4"></div>
    </div>
  </main>

  <!--
    Platzhalter für den Footer.
    Der Inhalt wird später per JavaScript aus components/footer.html geladen.
  -->
  <div id="footer-placeholder"></div>

  <!-- JavaScript für Header und Footer -->
  <script src="js/include.js"></script>

  <!-- JavaScript zum Prüfen der Session und Anpassen des Headers je nach Login-Status -->
  <script src="js/auth-header.js"></script>

  <!--
    JavaScript für das Suchformular im Header.
    Verarbeitet die Eingabe und leitet zur Suchseite weiter.
  -->
  <script src="js/suche.js"></script>

  <!-- JavaScript zum Laden der Kategorien für das Dropdown-Menü im Header -->
  <script src="js/kategorien.js"></script>

  <!-- JavaScript zum Laden aller Artikel der ausgewählten Kategorie -->
  <script src="js/kategorie-alle-artikel.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
