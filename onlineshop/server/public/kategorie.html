<!DOCTYPE html>

<html lang="de">

<!-- =========================
     HEAD / METADATEN & STYLES
========================= -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kategorie - MyShop</title>

  <!-- Bootstrap CSS (Layout, Grid & Responsivität) -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (Symbole) -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Eigenes zentrales Stylesheet -->

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- =========================
       HEADER (dynamisch geladen)
  ========================= -->

  <div id="header-placeholder"></div>

  <!-- =========================
       HAUPTINHALT KATEGORIE
  ========================= -->

  <main class="py-5">
    <div class="container">

      <!-- Titel der aktuellen Kategorie (wird dynamisch gesetzt) -->
      <h1 id="kategorie-title" class="section-title text-center mb-5">
        Kategorie
      </h1>

      <!-- =========================
           ARTIKEL DER KATEGORIE
      ========================= -->
      <div id="kategorie-artikel-container" class="row g-4">
        <!-- Wird dynamisch mit JavaScript gefüllt -->
      </div>

    </div>
  </main>

  <!-- =========================
       FOOTER (dynamisch geladen)
  ========================= -->

  <div id="footer-placeholder"></div>

  <!-- =========================
       SCRIPTS / FUNKTIONALITÄT
  ========================= -->

  <!-- Lädt Header & Footer -->
  <script src="js/include.js"></script>

  <!-- Zentrale Authentifizierungslogik -->
  <script src="js/utils/auth.js"></script>

  <!-- Zentrale Formatierungslogik für Preise -->
  <script src="js/utils/format.js"></script>

  <!-- Header dynamisch -->
  <script src="js/auth-header.js"></script>

  <!-- Suchfunktion -->
  <script src="js/suche.js"></script>

  <!-- Kategorien für Dropdown-Menü -->
  <script src="js/kategorien.js"></script>

  <!-- Kategorie-Seite Logik -->
  <script src="js/kategorie-alle-artikel.js"></script>

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
