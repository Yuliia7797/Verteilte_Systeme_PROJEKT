<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrieren - MyShop</title>

  <!-- Bootstrap CSS für Layout, Grid und responsive Darstellung -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons für Symbole -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Eigene zentrale CSS-Datei -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Platzhalter für den Header -->
  <div id="header-placeholder"></div>

  <!-- Hauptinhalt der Registrierungsseite -->
  <main class="py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
          <h1 class="section-title text-center mb-5">Registrieren</h1>

          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <form id="registrieren-form">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="vorname" class="form-label">Vorname *</label>
                    <input type="text" class="form-control" id="vorname" name="vorname" required>
                  </div>

                  <div class="col-md-6">
                    <label for="nachname" class="form-label">Nachname *</label>
                    <input type="text" class="form-control" id="nachname" name="nachname" required>
                  </div>

                  <div class="col-12">
                    <label for="email" class="form-label">E-Mail *</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                  </div>

                  <div class="col-12">
                    <label for="passwort" class="form-label">Passwort *</label>
                    <input type="password" class="form-control" id="passwort" name="passwort" required>
                    <div class="form-text">
                      Das Passwort muss mindestens 8 Zeichen lang sein und mindestens
                      einen Großbuchstaben, eine Zahl und ein Sonderzeichen enthalten.
                    </div>
                  </div>

                  <div class="col-md-8">
                    <label for="strasse" class="form-label">Straße *</label>
                    <input type="text" class="form-control" id="strasse" name="strasse" required>
                  </div>

                  <div class="col-md-4">
                    <label for="hausnummer" class="form-label">Hausnummer *</label>
                    <input type="text" class="form-control" id="hausnummer" name="hausnummer" required>
                  </div>

                  <div class="col-12">
                    <label for="adresszusatz" class="form-label">Adresszusatz</label>
                    <input type="text" class="form-control" id="adresszusatz" name="adresszusatz">
                  </div>

                  <div class="col-md-4">
                    <label for="postleitzahl" class="form-label">Postleitzahl *</label>
                    <input type="text" class="form-control" id="postleitzahl" name="postleitzahl" required>
                  </div>

                  <div class="col-md-4">
                    <label for="ort" class="form-label">Ort *</label>
                    <input type="text" class="form-control" id="ort" name="ort" required>
                  </div>

                  <div class="col-md-4">
                    <label for="land" class="form-label">Land *</label>
                    <input type="text" class="form-control" id="land" name="land" required>
                  </div>

                  <p class="text-muted text-center mb-4">Felder mit * sind Pflichtfelder.</p> 

                  <div class="col-12 d-grid mt-3">
                    <button type="submit" class="btn btn-dark">
                      Registrieren
                    </button>
                  </div>
                </div>
              </form>

              <div id="meldung" class="mt-3 text-center"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Platzhalter für den Footer -->
  <div id="footer-placeholder"></div>

  <!-- JavaScript für Header und Footer -->
  <script src="js/include.js"></script>

  <!-- JavaScript für das Suchformular im Header -->
  <script src="js/suche.js"></script>

  <!-- JavaScript zum Laden der Kategorien für das Dropdown-Menü im Header -->
  <script src="js/kategorien.js"></script>

  <!-- JavaScript für Registrierung -->
  <script src="js/registrieren.js"></script>

  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
