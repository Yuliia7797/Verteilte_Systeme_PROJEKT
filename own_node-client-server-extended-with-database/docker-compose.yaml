version: '3.3'
services:
  server:
    build: server
    ports:
      - "8080:8080"
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 10000
    depends_on:
      - onlinebestellsystem

  worker:
    build: server
    command: node worker.js
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOSTNAME: onlinebestellsystem
    depends_on:
      - onlinebestellsystem

  onlinebestellsystem:
    build: db
    restart: always
    environment:
      MYSQL_DATABASE: onlinebestellsystem
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: rootpw #user name is root

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - 8085:80
    environment:
      PMA_HOST: onlinebestellsystem